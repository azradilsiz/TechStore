<header class="app-header" *ngIf="!isAuthPage && !isAdminPage">
  <a class="brand" routerLink="/">
    <span class="brand-mark">
      TS
    </span>
    <div>
      <h1>TechStore</h1>
      <p>Teknoloji ürünleri ve aksesuarları</p>
    </div>
  </a>

  <form class="header-search" *ngIf="!isAuthPage" (ngSubmit)="searchProducts()">
    <input
      type="search"
      name="searchTerm"
      [(ngModel)]="searchTerm"
      placeholder="Ne arıyorsunuz?"
      aria-label="Ürün ara"
    >
    <button type="submit">Ara</button>
  </form>

  <nav class="main-nav" *ngIf="!isAuthPage">
    <a routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Ana Sayfa</a>
    <button class="menu-trigger" type="button" (click)="toggleCategoryMenu()">Kategoriler</button>
    <a routerLink="/products" routerLinkActive="active-link">Ürünler</a>
    <a routerLink="/cart" routerLinkActive="active-link">Sepet</a>
    <a routerLink="/orders" routerLinkActive="active-link" *ngIf="currentUser">Siparişlerim</a>
    <a routerLink="/admin" routerLinkActive="active-link" *ngIf="currentUser && isAdmin()">Admin Paneli</a>

    <a class="account-button login-account" *ngIf="!currentUser" routerLink="/login" routerLinkActive="active-link" aria-label="Giriş yap">
      <span class="account-symbol" aria-hidden="true"></span>
      <span>Giriş Yap</span>
    </a>

    <div class="account-menu" *ngIf="currentUser">
      <button class="account-button" type="button" aria-label="Hesap menüsü">
        <span class="profile-avatar">{{ getUserInitials() }}</span>
      </button>

      <div class="account-dropdown">
        <strong>{{ currentUser.fullName || currentUser.userName }}</strong>
        <span>{{ currentUser.email }}</span>
        <a routerLink="/profile">Profilim</a>
        <a routerLink="/orders">Siparişlerim</a>
        <button type="button" (click)="logout()">Çıkış Yap</button>
      </div>
    </div>
  </nav>
</header>

<div class="category-overlay" *ngIf="!isAdminPage && isCategoryMenuOpen" (click)="closeCategoryMenu()"></div>

<aside class="category-menu" *ngIf="!isAdminPage && isCategoryMenuOpen">
  <div class="category-menu-header">
    <h2>Kategoriler</h2>
    <button type="button" (click)="closeCategoryMenu()" aria-label="Kategorileri kapat">x</button>
  </div>

  <div class="category-menu-content">
    <section>
      <h3>Tüm Kategoriler</h3>
      <a
        *ngFor="let category of menuCategories"
        routerLink="/products"
        [queryParams]="{ category: category.value }"
        (click)="closeCategoryMenu()"
      >
        {{ category.label }}
      </a>
    </section>

    <section>
      <h3>Popüler Aramalar</h3>
      <a
        *ngFor="let search of popularSearches"
        routerLink="/products"
        [queryParams]="{ search: search }"
        (click)="closeCategoryMenu()"
      >
        {{ search }}
      </a>
    </section>
  </div>
</aside>

<main class="app-main">
  <router-outlet></router-outlet>
</main>
