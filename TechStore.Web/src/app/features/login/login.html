<section class="auth-page">
  <div class="auth-panel">
    <div class="auth-copy">
      <span class="eyebrow">TechStore hesabı</span>
      <h2>Giriş yap</h2>
      <p>Sepetini, adreslerini ve siparişlerini kendi hesabınla yönet.</p>
    </div>

    <form class="auth-form" (ngSubmit)="login()">
      <label>
        E-posta
        <input
          type="email"
          name="email"
          maxlength="100"
          [(ngModel)]="loginDto.email"
          placeholder="E-posta adresinizi girin"
        >
      </label>

      <label>
        Şifre
        <input
          type="password"
          name="password"
          minlength="6"
          maxlength="100"
          [(ngModel)]="loginDto.password"
          placeholder="Şifrenizi girin"
        >
      </label>

      <a class="forgot-password-link" routerLink="/forgot-password">Şifremi unuttum</a>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Giriş yapılıyor...' : 'Giriş Yap' }}
      </button>

      <p class="auth-link">
        Hesabın yok mu?
        <a routerLink="/register" [queryParams]="{ returnUrl: returnUrl }">Kayıt ol</a>
      </p>
    </form>
  </div>
</section>
