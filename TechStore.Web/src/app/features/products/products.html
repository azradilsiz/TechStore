<section class="products-page">
  <div class="page-header">
    <h2>Ürünler</h2>
    <p>TechStore ürün kataloğu</p>
  </div>

  <p *ngIf="isLoading">Ürünler yükleniyor...</p>

  <p *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </p>

  <div class="product-grid" *ngIf="!isLoading && !errorMessage">
    <article class="product-card" *ngFor="let product of products">
      <img
        [src]="product.imageUrl"
        [alt]="product.name"
        class="product-image"
      />

      <div class="product-info">
        <span class="category">{{ product.categoryName }}</span>
        <h3>{{ product.name }}</h3>
        <p>{{ product.description }}</p>

        <div class="product-footer">
          <strong>{{ product.price }} TL</strong>
          <span>Stok: {{ product.stock }}</span>
        </div>
      </div>
    </article>
  </div>
</section>
