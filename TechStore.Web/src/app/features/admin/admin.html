<div class="admin-layout">
  <aside class="admin-sidebar">
    <a class="admin-brand" routerLink="/admin">
      <span class="admin-brand-mark">TS</span>
      <span>
        <strong>TechStore</strong>
        <small>Yönetim Paneli</small>
      </span>
    </a>

    <nav class="admin-nav" aria-label="Yönetim menüsü">
      <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Genel Bakış</a>
      <a routerLink="/admin/products" routerLinkActive="active">Ürünler</a>
      <a routerLink="/admin/orders" routerLinkActive="active">Siparişler</a>
      <a routerLink="/admin/users" routerLinkActive="active">Kullanıcılar</a>
    </nav>

    <div class="admin-sidebar-footer">
      <a routerLink="/">Mağazaya dön</a>
      <button type="button" (click)="logout()">Çıkış yap</button>
    </div>
  </aside>

  <section class="admin-content">
    <header class="admin-topbar">
      <div>
        <span class="eyebrow">Yönetim paneli</span>
        <h1>Merhaba, {{ adminName }}</h1>
      </div>
      <span class="admin-status">Yönetici</span>
    </header>

    <main class="admin-main">
      <router-outlet></router-outlet>
    </main>
  </section>
</div>
