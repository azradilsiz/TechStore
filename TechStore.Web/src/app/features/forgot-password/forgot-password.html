<section class="auth-page">
  <div class="auth-panel">
    <div class="auth-copy">
      <span class="eyebrow">Hesap güvenliği</span>
      <h2>Şifremi unuttum</h2>
      <p>E-posta adresinizi girerek şifre yenileme sürecini başlatabilirsiniz.</p>
    </div>

    <form class="auth-form" (ngSubmit)="sendResetRequest()">
      <label>
        E-posta
        <input
          type="email"
          name="email"
          maxlength="100"
          [(ngModel)]="email"
          placeholder="E-posta adresinizi girin"
        >
      </label>

      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-message" *ngIf="message">{{ message }}</p>

      <button type="submit">Şifre Yenileme Talebi Oluştur</button>

      <p class="auth-link">
        Şifreni hatırladın mı?
        <a routerLink="/login">Giriş yap</a>
      </p>
    </form>
  </div>
</section>
